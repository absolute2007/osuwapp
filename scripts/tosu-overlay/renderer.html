<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Osuwapp Overlay</title>
    <style>
      * { box-sizing: border-box; }
      html, body, #app { width: 100%; height: 100%; margin: 0; overflow: hidden; background: transparent; font-family: Inter, "Segoe UI", Arial, sans-serif; color: #f4f7fb; }
      body { user-select: none; }
      .hud-panel { position: absolute; display: flex; align-items: center; min-width: 24px; min-height: 14px; border-radius: var(--radius, 8px); background: rgba(9, 12, 18, calc(.62 * var(--alpha))); border: 1px solid rgba(225, 236, 255, calc(.28 * var(--alpha))); box-shadow: 0 2px 0 rgba(0,0,0,.22), 0 10px 28px rgba(0,0,0,.18); overflow: hidden; text-shadow: 0 1px 2px rgba(0,0,0,.82); transform: scale(var(--panel-scale, 1)); transform-origin: top left; }
      .hud-panel[data-bg="false"] { background: transparent; border-color: transparent; box-shadow: none; }
      .pp { padding: 0 9px 0 11px; gap: 5px; font-weight: 800; letter-spacing: 0; }
      .pp::before { content: ""; position: absolute; left: 2px; top: 3px; bottom: 3px; width: 3px; border-radius: 6px; background: rgba(91, 177, 255, .9); }
      .pp strong { font-size: calc(20px * var(--font-scale, 1)); line-height: 1; }
      .pp span { color: #b0cff6; font-size: calc(10px * var(--font-scale, 1)); font-weight: 800; }
      .stats, .hits { gap: 2px; padding: 3px; }
      .cell { flex: 1; min-width: 0; height: 100%; border-radius: 6px; background: rgba(18, 26, 38, .58); border: 1px solid rgba(218, 232, 255, .12); padding: 2px 4px; overflow: hidden; }
      .cell span { display: block; color: #a0b5d2; font-size: calc(9px * var(--font-scale, 1)); font-weight: 800; line-height: 1.1; }
      .cell strong { display: block; color: #f8fbff; font-size: calc(12px * var(--font-scale, 1)); line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .hit-blue { background: rgba(31,96,164,.7); } .hit-orange { background: rgba(174,103,22,.68); } .hit-red { background: rgba(178,45,67,.7); } .hit-purple { background: rgba(102,66,160,.68); }
      .hit-blue strong { color: #b2deff; } .hit-orange strong { color: #ffd684; } .hit-red strong { color: #ff9aa6; } .hit-purple strong { color: #d5aeff; }
      .map { padding: 0 9px; color: #dce7f5; font-size: calc(12px * var(--font-scale, 1)); font-weight: 700; white-space: nowrap; text-overflow: ellipsis; }
      .selected { outline: 2px solid rgba(122,184,255,.95); outline-offset: 3px; }
      .selected::after { content: ""; position: absolute; right: -7px; bottom: -7px; width: 12px; height: 12px; border-radius: 4px; background: #7ab8ff; border: 1px solid rgba(3, 8, 16, .8); }
      .editor-bar { position: absolute; left: 50%; bottom: 28px; transform: translateX(-50%); min-width: 840px; max-width: calc(100vw - 48px); min-height: 58px; display: flex; align-items: center; gap: 8px; padding: 9px 10px; border-radius: 10px; background: rgba(10, 14, 21, .92); border: 1px solid rgba(190, 210, 238, .24); box-shadow: 0 18px 50px rgba(0,0,0,.35); backdrop-filter: blur(10px); }
      .editor-title { width: 128px; }
      .editor-title strong { display: block; font-size: 12px; } .editor-title span { display: block; color: #9facbf; font-size: 10px; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .seg { display: flex; gap: 3px; padding: 3px; border-radius: 8px; background: rgba(25, 33, 46, .76); }
      button { height: 30px; border: 0; border-radius: 6px; padding: 0 10px; color: #dce6f4; background: transparent; font: inherit; font-size: 11px; font-weight: 800; }
      button.active { color: #06101c; background: #8fc5ff; }
      label { display: grid; gap: 2px; width: 66px; color: #a8b6ca; font-size: 9px; font-weight: 800; }
      input { width: 100%; height: 22px; border: 1px solid rgba(128, 148, 174, .32); border-radius: 5px; background: rgba(17, 23, 33, .9); color: #f5f8fd; padding: 0 7px; font: inherit; font-size: 11px; font-weight: 700; }
      .switch { width: 38px; align-items: center; justify-items: center; }
      .switch input { width: 14px; height: 14px; padding: 0; accent-color: #8fc5ff; }
      .switch span { font-size: 10px; color: #dce6f4; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./renderer.mjs"></script>
  </body>
</html>
